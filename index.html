<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>জয়া টিকটক বোস্টার</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ffffff;
text-align:center;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
background:linear-gradient(90deg,#ff0000,#ff4040);
color:white;
padding:18px;
font-size:26px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

header img{
width:34px;
}

/* BANNER */

.banner{
width:100%;
}

.banner img{
width:100%;
height:auto;
display:block;
}

/* MENU */

.menu{
padding:15px;
}

/* BUTTON */

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
width:90%;
max-width:420px;
margin:12px auto;
padding:14px;

background:#ff0000;
color:white;
font-size:18px;
font-weight:bold;

border:none;
border-radius:10px;

cursor:pointer;

transition:0.3s;
}

.btn img{
width:22px;
}

.btn:hover{
background:#cc0000;
transform:scale(1.03);
}

/* IFRAME */

iframe{
width:100%;
height:520px;
border:none;
margin-top:10px;
}

</style>
</head>

<body>

<header>
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
জয়া টিকটক বোস্টার
</header>

<div class="banner">
<img src="https://raw.githubusercontent.com/emamulk63-design/joyatiktokbost/main/joyatiktok.png">
</div>

<div class="menu">

<button class="btn" onclick="openSite()">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
Views (ভিউস গ্রো করুন)
</button>

<button class="btn" onclick="openSite()">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
Comments Hearts (কমেন্টে লাভ নিন)
</button>

<button class="btn" onclick="openSite()">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
Favorites (প্রিয় তালিকায় সেট করুন)
</button>

<button class="btn" onclick="openSite()">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
Repost (দর্শক বাড়ান)
</button>

<button class="btn" onclick="openSite()">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
Hearts (লাইক নিন)
</button>

</div>

<iframe id="frame"></iframe>

<script>

function openSite(){
document.getElementById("frame").src="https://zefoy.com/";
}

</script>

</body>
</html>
